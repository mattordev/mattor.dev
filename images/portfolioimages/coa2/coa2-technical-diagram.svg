<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Corruption of Arcana Technical Diagram</title>
  <desc id="desc">Large readable flow: exploration to AI and tooling to persistence and delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1525"/>
      <stop offset="100%" stop-color="#1b1e31"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3f6d"/>
      <stop offset="100%" stop-color="#ffb28d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffab92"/>
    </marker>
    <style>
      .tag { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #15192a; }
      .title { font: 800 42px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .boxh { font: 800 28px 'Segoe UI', Arial, sans-serif; fill: #ffd7c3; }
      .boxp { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #e4e8f4; }
      .box { fill: rgba(16, 21, 35, 0.96); stroke: rgba(255,255,255,0.20); stroke-width: 2; rx: 18; }
      .arr { stroke: #ffab92; stroke-width: 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="40" y="24" width="420" height="42" rx="10" fill="url(#pill)"/>
  <text x="56" y="51" class="tag">CORRUPTION OF ARCANA - TECH STACK</text>
  <text x="40" y="118" class="title">Core System Flow</text>

  <rect class="box" x="40" y="170" width="350" height="185"/>
  <text x="68" y="220" class="boxh">Exploration</text>
  <text x="68" y="264" class="boxp">Map + player interaction</text>
  <text x="68" y="296" class="boxp">Encounter triggers</text>
  <text x="68" y="328" class="boxp">Shared quest/card data</text>

  <rect class="box" x="425" y="170" width="350" height="185"/>
  <text x="453" y="220" class="boxh">AI + Tooling</text>
  <text x="453" y="264" class="boxp">Wander / chase / follow states</text>
  <text x="453" y="296" class="boxp">NavMesh roaming improvements</text>
  <text x="453" y="328" class="boxp">Developer console commands</text>

  <rect class="box" x="810" y="170" width="350" height="185"/>
  <text x="838" y="220" class="boxh">Persistence</text>
  <text x="838" y="264" class="boxp">Scene + player save/load</text>
  <text x="838" y="296" class="boxp">Quest progression continuity</text>
  <text x="838" y="328" class="boxp">Combat return-state handling</text>

  <line class="arr" x1="390" y1="262" x2="420" y2="262"/>
  <line class="arr" x1="775" y1="262" x2="805" y2="262"/>

  <rect class="box" x="210" y="420" width="780" height="190"/>
  <text x="240" y="475" class="boxh">Delivery Ownership</text>
  <text x="240" y="520" class="boxp">Built the Android pipeline and shipped a playable Battle for Arcana build.</text>
  <text x="240" y="556" class="boxp">Supported team version control and integration stability.</text>

  <line class="arr" x1="600" y1="360" x2="600" y2="412"/>
</svg>
