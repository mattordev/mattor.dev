<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Corruption of Arcana Lessons Learned</title>
  <desc id="desc">Key lessons learned from tooling stability and persistence architecture improvements.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1525"></stop>
      <stop offset="100%" stop-color="#1b1e31"></stop>
    </linearGradient>

    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3f6d"></stop>
      <stop offset="100%" stop-color="#ffb28d"></stop>
    </linearGradient>

    <style>
      .tag { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #15192a; }
      .title { font: 800 42px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .boxh { font: 800 26px 'Segoe UI', Arial, sans-serif; fill: #ffd7c3; }
      .boxp { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #e4e8f4; }
      .box { fill: rgba(16, 21, 35, 0.96); stroke: rgba(255,255,255,0.20); stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"></rect>

  <!-- Top Pill -->
  <rect x="40" y="24" width="360" height="42" rx="10" fill="url(#pill)"></rect>
  <text x="56" y="51" class="tag">CORRUPTION OF ARCANA - REFLECTION</text>

  <!-- Title -->
  <text x="40" y="118" class="title">Lessons Applied</text>

  <!-- Left Box -->
  <rect class="box" x="40" y="180" width="540" height="340"></rect>
  <text x="70" y="230" class="boxh">Tooling &amp; Workflow</text>
  <text x="70" y="275" class="boxp">Stabilise internal tools early</text>
  <text x="70" y="310" class="boxp">Reduce friction in QA and playtesting</text>
  <text x="70" y="345" class="boxp">Reliable debug tools accelerate iteration</text>

  <!-- Right Box -->
  <rect class="box" x="620" y="180" width="540" height="340"></rect>
  <text x="650" y="230" class="boxh">System Architecture</text>
  <text x="650" y="275" class="boxp">Define clear data ownership boundaries</text>
  <text x="650" y="310" class="boxp">Separate runtime and persistent state</text>
  <text x="650" y="345" class="boxp">Design persistence before scaling systems</text>

  <!-- Bottom Summary (Wrapped Properly) -->
  <rect class="box" x="240" y="560" width="720" height="95"></rect>

  <text class="boxp">
    <tspan x="270" y="600">
      Strong architecture and stable tools improved long-session reliability
    </tspan>
    <tspan x="270" y="630">
      and significantly reduced regression bugs during playtesting.
    </tspan>
  </text>

</svg>